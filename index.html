<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CliniTrack - Coming Soon</title>
    <link rel="icon" type="image/png" href="assets/branding/favicon.png">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #04342C 0%, #085041 40%, #0F6E56 100%);
        color: #F5F5F3;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 600px;
      }

      .logo {
        width: 180px;
        margin-bottom: 2.5rem;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
      }

      .divider {
        width: 60px;
        height: 3px;
        background: #5DCAA5;
        margin: 1.5rem auto;
        border-radius: 2px;
      }

      p {
        font-size: 1.15rem;
        line-height: 1.7;
        color: #B8D8CC;
        margin-bottom: 1rem;
      }

      .contact {
        margin-top: 2.5rem;
        padding: 1.5rem 2rem;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .contact p {
        font-size: 1rem;
        color: #D0E8DD;
        margin-bottom: 0.5rem;
      }

      .contact a {
        color: #5DCAA5;
        text-decoration: none;
        font-weight: 600;
      }

      .contact a:hover {
        text-decoration: underline;
      }

      footer {
        margin-top: 3rem;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="assets/branding/logo-login.png" alt="CliniTrack" class="logo" />
      <h1>Under Construction</h1>
      <div class="divider"></div>
      <p>
        We're building something great. CliniTrack is currently under development
        and will be available soon.
      </p>
      <p>Check back for future updates.</p>

      <div class="contact">
        <p>For enquiries, get in touch:</p>
        <p><a href="mailto:contact@clinitrack.co.uk">contact@clinitrack.co.uk</a></p>
      </div>
    </div>

    <footer>&copy; 2026 CliniTrack. All rights reserved.</footer>
  </body>
</html>
