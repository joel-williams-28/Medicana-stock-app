    const formatExpiry = (expiryDate, format = 'short') => {
      // Handle both YYYY-MM and YYYY-MM-DD formats
      const parts = expiryDate.split('-');
      const dateStr = parts.length === 2 ? expiryDate + '-01' : `${parts[0]}-${parts[1]}-01`;
      const date = new Date(dateStr);
      return format === 'short'
        ? date.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })
        : date.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    };

    const getTotalQuantity = (med) => med.batches.reduce((sum, batch) => sum + (batch ? batch.quantity : 0), 0);

    // Get total number of boxes across all batches
    const getTotalBoxes = (med) => {
      return med.batches.reduce((sum, batch) => {
        return sum + (batch && batch.numberOfBoxes ? batch.numberOfBoxes : 0);
      }, 0);
    };

    // Helper function to format "item(s) per box" text
    const formatItemsPerBox = (count) => {
      return count === 1 ? '1 item per box' : `${count} items per box`;
    };

    const formatStockDisplay = (med) => {
      let totalFullBoxes = 0;
      let totalLooseItems = 0;
      let standardItemsPerBox = med.standardItemsPerBox || null;

      med.batches.forEach(batch => {
        if (!batch) return; // Skip null/undefined batches
        if (batch.itemsPerBox) {
          totalFullBoxes += Math.floor(batch.quantity / batch.itemsPerBox);
          totalLooseItems += batch.quantity % batch.itemsPerBox;
          if (!standardItemsPerBox) standardItemsPerBox = batch.itemsPerBox;
        } else {
          totalLooseItems += batch.quantity;
        }
      });

      // If we have itemsPerBox info, always show the × format
      if (standardItemsPerBox) {
        if (totalFullBoxes === 0 && totalLooseItems === 0) {
          return `0 boxes × ${formatItemsPerBox(standardItemsPerBox)}`;
        }
        if (totalFullBoxes && totalLooseItems) {
          return `${totalFullBoxes} ${totalFullBoxes === 1 ? 'box' : 'boxes'} × ${formatItemsPerBox(standardItemsPerBox)} + ${totalLooseItems} ${pluralizeUnit(totalLooseItems, med.unit)}`;
        }
        if (totalFullBoxes) {
          return `${totalFullBoxes} ${totalFullBoxes === 1 ? 'box' : 'boxes'} × ${formatItemsPerBox(standardItemsPerBox)}`;
        }
        // Only loose items
        return `${totalLooseItems} ${pluralizeUnit(totalLooseItems, med.unit)} (from open box)`;
      }

      // Fallback for medications without itemsPerBox
      if (totalFullBoxes === 0 && totalLooseItems === 0) {
        return `0 ${pluralizeUnit(0, med.unit)}`;
      }
      if (totalFullBoxes && totalLooseItems) {
        return `${totalFullBoxes} ${totalFullBoxes === 1 ? 'box' : 'boxes'} and ${totalLooseItems} ${pluralizeUnit(totalLooseItems, med.unit)}`;
      }
      return totalFullBoxes
        ? `${totalFullBoxes} ${totalFullBoxes === 1 ? 'box' : 'boxes'}`
        : `${totalLooseItems} ${pluralizeUnit(totalLooseItems, med.unit)}`;
    };

    const formatBatchDetails = (batch, unit) => {
      if (!batch.itemsPerBox) {
        return `${batch.quantity} ${pluralizeUnit(batch.quantity, unit)}`;
      }

      const fullBoxes = Math.floor(batch.quantity / batch.itemsPerBox);
      const looseItems = batch.quantity % batch.itemsPerBox;

      if (fullBoxes === 0) {
        return `${looseItems} ${pluralizeUnit(looseItems, unit)} (from open box)`;
      } else if (looseItems === 0) {
        return `${fullBoxes} ${fullBoxes === 1 ? 'box' : 'boxes'} × ${formatItemsPerBox(batch.itemsPerBox)}`;
      } else {
        return `${fullBoxes} ${fullBoxes === 1 ? 'box' : 'boxes'} × ${formatItemsPerBox(batch.itemsPerBox)} + ${looseItems} ${pluralizeUnit(looseItems, unit)}`;
      }
    };

    const formatMinLevelDisplay = (med) => {
      // minLevelBoxes is already in boxes, so display it directly
      const boxes = med.minLevelBoxes || 0;
      return `${boxes} ${boxes === 1 ? 'box' : 'boxes'}`;
    };

        const getUnitName = (type) => {
          const unitMap = {
            tablet: 'tablets', capsule: 'capsules', liquid: 'bottles',
            vial: 'vials', ampule: 'ampules', 'Pre Filled Syringe': 'syringes',
            inhaler: 'inhalers'
          };
          return unitMap[type] || type;
        };

        const pluralizeUnit = (quantity, unit) => {
          if (quantity === 1) return unit;
          const pluralMap = {
            'tablet': 'tablets',
            'capsule': 'capsules',
            'pre-filled syringe': 'pre-filled syringes',
            'Pre-filled Syringe': 'Pre-filled Syringes',
            'inhaler': 'inhalers',
            'cream': 'creams',
        'vial': 'vials',
        'ampule': 'ampules',
        'bottle': 'bottles'
      };
      return pluralMap[unit] || unit;
    };

    // Get unit label for "individual" display (e.g., "individual ampule", "individual capsule")
    const getIndividualUnitLabel = (unit) => {
      const unitMap = {
        'tablet': 'tablet',
        'capsule': 'capsule',
        'ampule': 'ampule',
        'ampoule': 'ampoule',
        'vial': 'vial',
        'bottle': 'bottle',
        'pre-filled syringe': 'pre-filled syringe',
        'Pre-filled Syringe': 'pre-filled syringe',
        'inhaler': 'inhaler',
        'cream': 'cream',
        'stock': 'unit',
        'units': 'unit'
      };
      const normalizedUnit = (unit || '').toLowerCase();
      return unitMap[normalizedUnit] || normalizedUnit || 'unit';
    };

    const getUsageOptionsForLocation = (locationName) => {
      if (locationName === 'PACU') {
        return [
          { value: 'post-op', label: 'Post-op use' },
          { value: 'pain-relief', label: 'Pain relief' },
          { value: 'nausea', label: 'Nausea' },
          { value: 'other', label: 'Other' }
        ];
      } else if (locationName && locationName.startsWith('Theatre')) {
        return [
          { value: 'anaesthesia', label: 'Anaesthesia' },
          { value: 'antibiotic-prophylaxis', label: 'Antibiotic prophylaxis' },
          { value: 'emergency-use', label: 'Emergency use' },
          { value: 'other', label: 'Other' }
        ];
      } else if (locationName && locationName.startsWith('Ward')) {
        return [
          { value: 'regular-dose', label: 'Regular dose' },
          { value: 'prn-use', label: 'PRN use' },
          { value: 'tto', label: 'TTOs' },
          { value: 'other', label: 'Other' }

      } else if (locationName === 'Sapphire Clinic') {
        return [
          { value: 'pre-op-prep', label: 'Pre-op prep' },
          { value: 'local-anaesthetic', label: 'Local anaesthetic' },
          { value: 'post-op-drop', label: 'Post-op drop' },

        ];
      } else if (locationName === 'Radiology') {
        return [
          { value: 'contrast', label: 'Contrast' },
          { value: 'sedation', label: 'Sedation' },
          { value: 'allergy-prophylaxis', label: 'Allergy prophylaxis' },

      } else if (locationName === 'Pharmacy') {
        return [
          { value: 'supply', label: 'Supply' },
          { value: 'restock', label: 'Re-stock' },
          { value: 'disposal', label: 'Disposal' },
          { value: 'other', label: 'Other' }

      }
      return [
        { value: 'general-use', label: 'General use' },
        { value: 'emergency', label: 'Emergency use' },
        { value: 'routine', label: 'Routine use' },
        { value: 'other', label: 'Other' }
      ];
    };

    const createTransaction = (baseData, nextId) => ({
      id: nextId,
      timestamp: new Date().toISOString(),
      ...baseData
    });

    const categorizeTransaction = (trans, locations) => {
      if (trans.type === 'order') return 'order';
      if (trans.type === 'order_fulfilled') return 'order_fulfilled';
      if (trans.type === 'delete') return 'system';
      // Check if this is a batch removal (note starts with "Batch removed")
      if (trans.note && trans.note.startsWith('Batch removed')) return 'removal';
      if (trans.location === 'Batch Removal') return 'removal';
      if (trans.location === 'System') return 'system';
      if (trans.type === 'in' && (trans.location === 'Delivery' || trans.location === 'Stock Delivery')) return 'delivery';
      if (trans.type === 'in' && locations.includes(trans.location)) return 'transfer';
      if (trans.type === 'out' && locations.includes(trans.location)) return 'transfer';
      return trans.type === 'out' ? 'dispensing' : 'system';
    };

    const formatQuantityDisplay = (quantity, itemsPerBox, unit, inputType = 'boxes', inputAmount = null) => {
      if (inputType === 'boxes' && inputAmount && itemsPerBox) {
        return `${inputAmount} ${inputAmount === '1' ? 'box' : 'boxes'} × ${formatItemsPerBox(itemsPerBox)}`;
      }
      return `${quantity} ${unit}`;
    };

    // Helper function to get location names for filtering based on current selection
    // Returns an array of location names to check against
    const getLocationNamesToCheck = (currentLocationValue, locationsArray) => {
      if (currentLocationValue === 'All') return null; // null means check all

      // Check if this is a group name (exists as a group_name in locations)
      const isGroup = locationsArray.some(loc => loc.groupName === currentLocationValue);

      if (isGroup) {
        // Return all location displayNames in this group
        return locationsArray
          .filter(loc => loc.groupName === currentLocationValue)
          .map(loc => loc.displayName);
      }

      // It's a specific location, return just that one
      return [currentLocationValue];
    };

    // Helper function to check if a medication matches the current location filter
    const matchesLocationFilter = (med, currentLocationValue, locationsArray) => {
      if (currentLocationValue === 'All') return true;

      const locationNames = getLocationNamesToCheck(currentLocationValue, locationsArray);
      return locationNames.includes(med.location);
    };

    // Helper function to check if a value is a group name
    const isGroupName = (value, locationsArray) => {
      return locationsArray.some(loc => loc.groupName === value);
    };

    const validatePassword = async (username, password) => {
      try {
        const res = await fetch('/.netlify/functions/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        return res.ok && data.success;
      } catch (e) {
        console.error('Password verification error:', e);
        return false;
      }
    };

    const getCurrentUserInfo = () => {
      const userStr = sessionStorage.getItem('currentUser');
      if (!userStr) return null;
      try {
        return JSON.parse(userStr);
      } catch (e) {
        return null;
      }
    };

    // Helper functions for role-based access control
    const getUserRole = () => {
      const user = getCurrentUserInfo();
      return user?.role || null;
    };

    const hasAccessTo = (feature) => {
      const role = getUserRole();
      if (!role) return false;

      // Administrator and Pharmacist have full access
      if (role === 'Administrator' || role === 'Pharmacist') {
        return true;
      }

      // Stock Manager: Access to everything except Intelligence Report
      if (role === 'Stock Manager') {
        return feature !== 'intelligenceReport';
      }

      // Stock User: Access to everything except Activity Log, Intelligence Report, and Export Simple Report
      if (role === 'Stock User') {
        return !['activityLog', 'intelligenceReport', 'exportSimpleReport'].includes(feature);
      }

      // Basic User: Only access to transfer stock functionality
      if (role === 'Basic User') {
        return feature === 'transferStock';
      }

      // Default: no access
      return false;
    };

    const canAccessTab = (tabName) => {
      const role = getUserRole();
      if (!role) return false;

      // Purchase Orders tab: Admin and Pharmacist only
      if (tabName === 'purchaseorders') {
        return role === 'Administrator' || role === 'Pharmacist';
      }

      // Med Database tab: Admin only
      if (tabName === 'meddatabase') {
        return role === 'Administrator';
      }

      // Administrator and Pharmacist have access to all tabs
      if (role === 'Administrator' || role === 'Pharmacist') {
        return true;
      }

      // Stock Manager: Access to all tabs
      if (role === 'Stock Manager') {
        return true;
      }

      // Stock User: Access to all tabs except Activity Log
      if (role === 'Stock User') {
        return tabName !== 'transactions'; // transactions tab is the Activity Log
      }

      // Basic User: Only access to medications tab (for transferring stock)
      if (role === 'Basic User') {
        return tabName === 'medications';
      }

      return false;
    };

    const findEarliestBatch = (batches) => {
      if (!batches || batches.length === 0) return null;
      return batches.reduce((earliest, batch) => {
        if (!batch || !batch.expiryDate) return earliest;
        if (!earliest || !earliest.expiryDate) return batch;
        return new Date(batch.expiryDate + '-01') < new Date(earliest.expiryDate + '-01') ? batch : earliest;
      });
    };

        // Check orders from database (using internalId)
        // Orders are stored with medication_id (internal database ID), not display ID
        const medInternalId = typeof med === 'object' ? med.internalId : null;
        return medInternalId && orders.some(o => o.medId === medInternalId && o.status === 'pending');
      };
        const getMostRecentOrder = (med) => {
          // Get most recent pending order from database
          const medInternalId = typeof med === 'object' ? med.internalId : null;
          if (!medInternalId) return null;
          const pendingOrders = orders.filter(o => o.medId === medInternalId && o.status === 'pending');
          return pendingOrders.length > 0 ? pendingOrders[0] : null;
        };

      // Auto-fulfil pending orders when a delivery arrives
      const autoFulfillOrders = async (medicationInternalId, medicationName, deliveredQuantityUnits) => {
        const pendingOrders = orders
          .filter(o => o.medId === medicationInternalId && o.status === 'pending')
          .sort((a, b) => new Date(a.orderedAt) - new Date(b.orderedAt));

        if (pendingOrders.length === 0) return;

        const currentUser = getCurrentUserInfo();
        let remaining = deliveredQuantityUnits;

        for (const order of pendingOrders) {
          if (remaining <= 0) break;
          const orderRemaining = order.quantity - (order.quantityFulfilled || 0);
          const applyAmount = Math.min(remaining, orderRemaining);

          try {
            await window.api.fulfillOrder({
              orderId: order.id,
              userId: currentUser?.id || null,
              medicationName,
              quantityDelivered: applyAmount
            });
          } catch (err) {
            console.error('Auto-fulfill failed for order', order.id, err);
          }

          remaining -= applyAmount;
        }
      };

        const lowStockMedications = (() => {
          const filtered = medications
            .filter(med => matchesLocationFilter(med, ui.currentLocation, locations))
            .filter(med => {
              // Include medications that are below minimum level OR have zero stock with pending orders
              return getTotalBoxes(med) < med.minLevelBoxes || (getTotalBoxes(med) === 0 && hasPendingOrder(med));
            });
          
          // Group by name when viewing "All Locations"
          if (ui.currentLocation === 'All') {
            const grouped = {};
            filtered.forEach(med => {
              if (!grouped[med.name]) {
                grouped[med.name] = {
                  ...med,
                  locations: [med.location],
                  batches: med.batches.map(b => ({ ...b, location: med.location })),
                  originalMeds: [med]
                };
              } else {
                if (!grouped[med.name].locations.includes(med.location)) {
                  grouped[med.name].locations.push(med.location);
                }
                const batchesWithLocation = med.batches.map(b => ({ ...b, location: med.location }));
                grouped[med.name].batches = [...grouped[med.name].batches, ...batchesWithLocation];
                grouped[med.name].originalMeds.push(med);
              }
            });
            return Object.values(grouped).map(med => ({
              ...med,
              batches: med.batches.filter(b => b).sort((a, b) => {
                if (!a || !a.expiryDate) return 1;
                if (!b || !b.expiryDate) return -1;
                const dateA = new Date(a.expiryDate + '-01');
                const dateB = new Date(b.expiryDate + '-01');
                return dateA - dateB;
              })
            }));
          }
          return filtered;
        })();

      const filteredTransactions = transactions.filter(trans => {
        // Always show order transactions regardless of location filter
        if (trans.type === 'order') return true;
        if (trans.medId === 0) return trans.type === 'order' && lowStockMedications.length > 0;
        if (ui.currentLocation === 'All') return true;

        // Get location names to check (handles grouped locations)
        const locationNamesToCheck = getLocationNamesToCheck(ui.currentLocation, locations);
        
        // Check if transaction location matches (transaction happened at this location)
        const locationMatches = locationNamesToCheck.includes(trans.location);
        
        // Check if transaction note contains location references
        const note = (trans.note || '').toLowerCase();
        const noteContainsLocation = locationNamesToCheck.some(locName => {
          const locNameLower = locName.toLowerCase();
          // Check for various patterns in the note (case-insensitive)
          return note.includes(`transfer to ${locNameLower}`) ||
                 note.includes(`transfer from ${locNameLower}`) ||
                 note.includes(`dispensed to ${locNameLower}`) ||
                 note.includes(`stock added to ${locNameLower}`) ||
                 note.includes(`stock received from ${locNameLower}`) ||
                 note.includes(`received from ${locNameLower}`) ||
                 (note.includes('delivery received') && locationMatches) ||
                 (note.includes('auto-adjustment') && locationMatches);
        });
        
        // Check if medication is in the selected location (for backward compatibility)
        const medication = medications.find(m => m.id === trans.medId);
        const medicationInLocation = medication && locationNamesToCheck.includes(medication.location);
        
        // Show transaction if it's related to the location in any way:
        // - Transaction happened at this location
        // - Transaction note mentions this location
        // - Medication is stored at this location
        return locationMatches || noteContainsLocation || medicationInLocation;
      });

        // Get dynamic filter options
        const availableTypes = [...new Set(medications
          .filter(med => matchesLocationFilter(med, ui.currentLocation, locations))
          .map(med => med.type))].sort();
        
        const availableLocations = [...new Set(medications.map(med => med.location))].sort();
        
        // Count how many entries each medication name has (across locations/batches)
        const locationMeds = medications.filter(med => matchesLocationFilter(med, ui.currentLocation, locations));
        const medNameCounts = {};
        locationMeds.forEach(med => {
          const key = med.name;
          if (!medNameCounts[key]) medNameCounts[key] = 0;
          medNameCounts[key] += (med.batches ? med.batches.filter(b => b && b.expiryDate).length : 0);
        });
        const hasMultipleInstances = (med) => (medNameCounts[med.name] || 0) > 1;

        const availableStatuses = (() => {
          const statuses = new Set();
          locationMeds.forEach(med => {
              const totalBoxes = getTotalBoxes(med);
              if (totalBoxes === 0 && hasPendingOrder(med)) {
                statuses.add('Order Pending');
              } else if (totalBoxes < med.minLevelBoxes) {
                statuses.add('Low Stock');
                if (hasPendingOrder(med)) statuses.add('Ordered');
              } else if (totalBoxes >= med.minLevelBoxes) {
                statuses.add('OK');
                if (hasPendingOrder(med)) statuses.add('Ordered');
              }
              if (med.batches && med.batches.some(b => b && b.expiryDate)) {
                statuses.add('Expiring First');
              }
            });
          return Array.from(statuses).sort();
        })();

        const filteredMedications = medications
          .filter(med => matchesLocationFilter(med, ui.currentLocation, locations))
          .filter(med =>
            med.name.toLowerCase().includes(debouncedSearchTerm.toLowerCase()) ||
            (med.barcode && med.barcode.toLowerCase().includes(debouncedSearchTerm.toLowerCase())) ||
            (med.batches && med.batches.some(batch => batch.batchNumber && batch.batchNumber.toLowerCase().includes(debouncedSearchTerm.toLowerCase())))
          )
          .filter(med => medicationFilters.types.length === 0 || medicationFilters.types.includes(med.type))
          .filter(med => medicationFilters.locations.length === 0 || medicationFilters.locations.includes(med.location))
          .filter(med => {
            if (medicationFilters.statuses.length === 0) return true;
            // "Expiring First" is a sort mode, not a filter — show all medications
            const nonSortStatuses = medicationFilters.statuses.filter(s => s !== 'Expiring First');
            if (nonSortStatuses.length === 0) return true;
            const totalBoxes = getTotalBoxes(med);
            const isLowStock = totalBoxes < med.minLevelBoxes && totalBoxes > 0;
            const isOK = totalBoxes >= med.minLevelBoxes;
            const isOrdered = hasPendingOrder(med) && totalBoxes > 0;
            const isOrderPending = totalBoxes === 0 && hasPendingOrder(med);

            return nonSortStatuses.some(status => {
              if (status === 'Low Stock' && isLowStock) return true;
              if (status === 'OK' && isOK) return true;
              if (status === 'Ordered' && isOrdered) return true;
              if (status === 'Order Pending' && isOrderPending) return true;
              return false;
            });
          })
          .sort((a, b) => {
            if (medicationFilters.statuses.includes('Expiring First')) {
              const earliestA = findEarliestBatch(a.batches);
              const earliestB = findEarliestBatch(b.batches);
              const dateA = earliestA && earliestA.expiryDate ? new Date(earliestA.expiryDate + '-01') : new Date('9999-01-01');
              const dateB = earliestB && earliestB.expiryDate ? new Date(earliestB.expiryDate + '-01') : new Date('9999-01-01');
              if (dateA.getTime() !== dateB.getTime()) return dateA - dateB;
            }
            const nameCompare = a.name.localeCompare(b.name);
            return nameCompare !== 0 ? nameCompare : a.location.localeCompare(b.location);
          });

        // Group medications by name when viewing "All Locations"
        const displayMedications = ui.currentLocation === 'All' ? (() => {
          const grouped = {};
          filteredMedications.forEach(med => {
            if (!grouped[med.name]) {
              grouped[med.name] = {
                ...med,
                minLevelBoxes: med.minLevelBoxes || 0,
                locations: [med.location],
                batches: med.batches.map(b => ({ ...b, locations: [{ location: med.location, quantity: b.quantity }], totalQuantity: b.quantity })),
                originalMeds: [med]
              };
            } else {
              // Add this location
              if (!grouped[med.name].locations.includes(med.location)) {
                grouped[med.name].locations.push(med.location);
              }
              // Sum min levels across locations for aggregate view
              grouped[med.name].minLevelBoxes += (med.minLevelBoxes || 0);
              
              // Merge batches intelligently - group by batch number and expiry date
              med.batches.forEach(newBatch => {
                if (!newBatch) return; // Skip null/undefined batches
                const existingBatch = grouped[med.name].batches.find(b =>
                  b && b.expiryDate === newBatch.expiryDate &&
                  b.batchNumber === newBatch.batchNumber &&
                  b.brand === newBatch.brand
                );
                
                if (existingBatch) {
                  // Same batch exists - add this location and combine quantities
                  existingBatch.locations.push({ location: med.location, quantity: newBatch.quantity });
                  existingBatch.totalQuantity += newBatch.quantity;
                  // Update quantity and numberOfBoxes to reflect the total across all locations
                  existingBatch.quantity = existingBatch.totalQuantity;
                  if (existingBatch.itemsPerBox) {
                    existingBatch.numberOfBoxes = Math.floor(existingBatch.totalQuantity / existingBatch.itemsPerBox);
                  }
                } else {
                  // New batch - add it
                  grouped[med.name].batches.push({
                    ...newBatch,
                    locations: [{ location: med.location, quantity: newBatch.quantity }],
                    totalQuantity: newBatch.quantity,
                    // Ensure quantity matches totalQuantity for display functions
                    quantity: newBatch.quantity
                  });
                }
              });
              
              // Keep track of original medications
              grouped[med.name].originalMeds.push(med);
            }
          });
          
          // Sort batches by expiry date and return as array
          return Object.values(grouped).map(med => ({
            ...med,
            batches: med.batches.filter(b => b).sort((a, b) => {
              if (!a || !a.expiryDate) return 1;
              if (!b || !b.expiryDate) return -1;
              const dateA = new Date(a.expiryDate + '-01');
              const dateB = new Date(b.expiryDate + '-01');
              return dateA - dateB;
            })
          }));
        })() : filteredMedications;

        // Auto-clear filters if no medications match and filters are active
        React.useEffect(() => {
          const hasActiveFilters = medicationFilters.types.length > 0 || 
                                   medicationFilters.locations.length > 0 || 
                                   medicationFilters.statuses.length > 0;
          
          if (hasActiveFilters && filteredMedications.length === 0 && medications.length > 0) {
            const medsInCurrentLocation = medications.filter(med =>
              matchesLocationFilter(med, ui.currentLocation, locations)
            );
            
            if (medsInCurrentLocation.length > 0) {
              setMedicationFilters({ types: [], locations: [], statuses: [] });
            }
          }
        }, [filteredMedications.length, medicationFilters, medications.length, ui.currentLocation]);

        // Auto-open "Add New Medication" modal when barcode is scanned in search and no results found
        React.useEffect(() => {
          // Clear any existing timeout when search term changes
          if (searchBarcodeDetection.timeoutId) {
            clearTimeout(searchBarcodeDetection.timeoutId);
            setSearchBarcodeDetection(prev => ({ ...prev, timeoutId: null }));
          }
          
          // Only trigger if:
          // 1. There's a search term (barcode)
          // 2. It was entered rapidly (indicating barcode scanner)
          // 3. No medications found
          // 4. Search term looks like a barcode (8+ characters)
          if (ui.searchTerm && 
              ui.searchTerm.length >= 8 && 
              searchBarcodeDetection.inputSpeed < 50 && // Very fast typing = barcode scanner
              displayMedications.length === 0 &&
              medications.length > 0) {
            
            // Set a timeout to open the modal (small delay to ensure user sees "no results")
            const timeoutId = setTimeout(() => {
              const currentUser = getCurrentUserInfo();
              let defaultLocation = 'Cupboard 1';
              
              // Use user's primary location if available
              if (currentUser && currentUser.primaryLocation) {
                const userLocation = locations.find(loc => 
                  loc.displayName === currentUser.primaryLocation || loc.id === currentUser.primaryLocation
                );
                if (userLocation) {
                  defaultLocation = userLocation.displayName;
                } else if (ui.currentLocation !== 'All' && !isGroupName(ui.currentLocation, locations)) {
                  defaultLocation = ui.currentLocation;
                }
              } else if (ui.currentLocation !== 'All' && !isGroupName(ui.currentLocation, locations)) {
                defaultLocation = ui.currentLocation;
              }
              
              setModals(prev => ({ ...prev, showBarcodeNewMedication: true }));
              setBarcodeNewMedForm(prev => ({ 
                ...prev, 
                barcode: ui.searchTerm,
                location: defaultLocation,
                strengthType: 'value' // Always default to 'value' for new barcode scans
              }));
              // Trigger barcode lookup when modal opens
              handleBarcodeLookup(ui.searchTerm);
              // Clear search term after opening modal
              setUi(prev => ({ ...prev, searchTerm: '' }));
              // Reset input speed detection
              setSearchBarcodeDetection(prev => ({ ...prev, inputSpeed: 1000, timeoutId: null }));
            }, 500); // 500ms delay
            
            setSearchBarcodeDetection(prev => ({ ...prev, timeoutId }));
          } else if (!ui.searchTerm) {
            // Reset input speed when search is cleared
            setSearchBarcodeDetection(prev => ({ ...prev, inputSpeed: 1000 }));
          }
        }, [ui.searchTerm, displayMedications.length, searchBarcodeDetection.inputSpeed, medications.length, ui.currentLocation]);

        // Auto-trigger barcode lookup when modal opens with a barcode
        React.useEffect(() => {
          if (modals.showBarcodeNewMedication && barcodeNewMedForm.barcode && barcodeNewMedForm.barcode.trim()) {
            const barcode = barcodeNewMedForm.barcode.trim();
            // Only trigger if medication is not already locked (to avoid re-triggering)
            if (!barcodeNewMedForm.medicationLocked) {
              // Small delay to ensure modal is fully rendered
              const timeoutId = setTimeout(() => {
                handleBarcodeLookup(barcode);
              }, 200);
              return () => clearTimeout(timeoutId);
            }
          }
        }, [modals.showBarcodeNewMedication, barcodeNewMedForm.barcode, barcodeNewMedForm.medicationLocked]);

      // Helper function to get internal location ID from display name
      const getLocationId = (displayName) => {
        if (!displayName) return null;
        const location = locations.find(loc => loc.displayName === displayName);
        return location ? location.id : displayName; // fallback to displayName if not found
      };

      // Batch integrity safeguard — do not remove.
      // Checks if a batch_code exists and auto-fills/locks form fields
      const checkBatchCode = async (batchCode, formType) => {
        if (!batchCode || !batchCode.trim()) {
          // Clear lock state if batch code is empty
          if (formType === 'delivery') {
            setDeliveryForm(prev => ({ ...prev, batchLocked: false, batchExists: false }));
          } else if (formType === 'barcode') {
            setBarcodeNewMedForm(prev => ({ ...prev, batchLocked: false, batchExists: false }));
          }
          return;
        }

        try {
          const result = await window.api.checkBatch(batchCode.trim());

          if (result.exists && result.batch) {
            const batch = result.batch;
            // Parse expiry date
            const expiryDate = batch.expiryDateFull ? new Date(batch.expiryDateFull) : null;
            const expiryMonth = expiryDate ? String(expiryDate.getMonth() + 1).padStart(2, '0') : '';
            const expiryYear = expiryDate ? String(expiryDate.getFullYear()) : '';

            // Auto-fill and lock fields
            if (formType === 'delivery') {
              setDeliveryForm(prev => ({
                ...prev,
                brand: batch.brand || '',
                expiryMonth: expiryMonth,
                expiryYear: expiryYear,
                itemsPerBox: batch.itemsPerBox ? String(batch.itemsPerBox) : '',
                batchLocked: true,
                batchExists: true
              }));
            } else if (formType === 'barcode') {
              setBarcodeNewMedForm(prev => ({
                ...prev,
                brand: batch.brand || '',
                expiryMonth: expiryMonth,
                expiryYear: expiryYear,
                itemsPerBox: batch.itemsPerBox ? String(batch.itemsPerBox) : '',
                batchLocked: true,
                batchExists: true
              }));
            }
          } else {
            // Batch doesn't exist - unlock fields
            if (formType === 'delivery') {
              setDeliveryForm(prev => ({ ...prev, batchLocked: false, batchExists: false }));
            } else if (formType === 'barcode') {
              setBarcodeNewMedForm(prev => ({ ...prev, batchLocked: false, batchExists: false }));
            }
          }
        } catch (err) {
          console.error('Failed to check batch code:', err);
          // On error, don't lock fields
          if (formType === 'delivery') {
            setDeliveryForm(prev => ({ ...prev, batchLocked: false, batchExists: false }));
          } else if (formType === 'barcode') {
            setBarcodeNewMedForm(prev => ({ ...prev, batchLocked: false, batchExists: false }));
          }
        }
      };

      // Barcode lookup handler - called when barcode is entered/scanned
      const handleBarcodeLookup = async (barcode) => {
        if (!barcode || !barcode.trim()) {
          // Clear medication lock state if barcode is empty
          setBarcodeNewMedForm(prev => ({
            ...prev,
            medicationId: null,
            medicationLocked: false,
            existingBatches: [],
            existingBatchId: null,
            name: '',
            strength: '',
            strengthType: 'value',
            type: 'tablet',
            itemsPerBox: ''
          }));
          return;
        }

        try {
          if (!window.api || !window.api.lookupByBarcode) {
            console.error('window.api.lookupByBarcode is not available');
            throw new Error('Barcode lookup API is not available');
          }
          const result = await window.api.lookupByBarcode(barcode.trim());

          if (result.found && result.medication) {
            const med = result.medication;
            // Prefill and lock medication fields
            setBarcodeNewMedForm(prev => ({
              ...prev,
              medicationId: med.id,
              medicationLocked: true,
              name: med.name,
              strength: med.strength_raw || '',
              strengthType: med.strength_raw ? 'value' : 'na',
              type: med.type.toLowerCase() || 'tablet',
              itemsPerBox: med.standard_items_per_box ? String(med.standard_items_per_box) : '',
              existingBatches: result.existingBatches || [],
              existingBatchId: null // Reset batch selection
            }));
          } else {
            // Medication not found - unlock fields for manual entry
            setBarcodeNewMedForm(prev => ({
              ...prev,
              medicationId: null,
              medicationLocked: false,
              existingBatches: [],
              existingBatchId: null
            }));
            // Focus the Name field so user can start typing (only if camera is closed)
            setTimeout(() => {
              if (!cameraScanner.isOpen) {
                const nameEl = document.getElementById('barcodeNewMed-name');
                if (nameEl && !nameEl.readOnly) nameEl.focus();
              }
            }, 150);
          }
        } catch (err) {
          console.error('Failed to lookup barcode:', err);
          // On error, allow manual entry
          setBarcodeNewMedForm(prev => ({
            ...prev,
            medicationId: null,
            medicationLocked: false,
            existingBatches: [],
            existingBatchId: null
          }));
        }
      };

      // Batch number lookup handler - called when batch number is available but no barcode
      const handleBatchLookup = async (batchNumber) => {
        if (!batchNumber || !batchNumber.trim()) {
          return;
        }

        try {
          if (!window.api || !window.api.checkBatch) {
            console.error('window.api.checkBatch is not available');
            throw new Error('Batch lookup API is not available');
          }
          const result = await window.api.checkBatch(batchNumber.trim());

          if (result.exists && result.batch) {
            const batch = result.batch;
            // Prefill and lock medication fields based on batch information
            // The batch contains medicationDisplayId (name + strength)

            // Parse medication display ID to extract name and strength
            let name = batch.medicationDisplayId || '';
            let strength = '';

            // Try to extract strength from display ID
            // Format is typically "Name Strength" (e.g., "Paracetamol 500mg")
            const lastSpaceIndex = name.lastIndexOf(' ');
            if (lastSpaceIndex > 0) {
              const potentialStrength = name.substring(lastSpaceIndex + 1);
              // Check if it looks like a strength (contains numbers)
              if (/\d/.test(potentialStrength)) {
                strength = potentialStrength;
                name = name.substring(0, lastSpaceIndex);
              }
            }

            // Convert expiry date from batch to month/year
            let expiryMonth = '';
            let expiryYear = '';
            if (batch.expiryDate) {
              // expiryDate is in YYYY-MM format
              const [year, month] = batch.expiryDate.split('-');
              expiryMonth = month || '';
              expiryYear = year || '';
            }

            setBarcodeNewMedForm(prev => ({
              ...prev,
              medicationId: batch.medicationId,
              medicationLocked: true,
              name: name,
              strength: strength || '',
              strengthType: strength ? 'value' : 'na',
              type: batch.form ? batch.form.toLowerCase() : 'tablet',
              itemsPerBox: batch.itemsPerBox ? String(batch.itemsPerBox) : prev.itemsPerBox,
              brand: batch.brand || prev.brand,
              expiryMonth: expiryMonth || prev.expiryMonth,
              expiryYear: expiryYear || prev.expiryYear,
              // Note: we don't have existingBatches from batch lookup
              // Could be enhanced in future to fetch all batches for this medication
              existingBatches: [],
              existingBatchId: null
            }));

          } else {
            // Batch not found - leave fields unlocked for manual entry
            setBarcodeNewMedForm(prev => ({
              ...prev,
              medicationId: null,
              medicationLocked: false,
              existingBatches: [],
              existingBatchId: null
            }));
          }
        } catch (err) {
          console.error('Failed to lookup batch:', err);
          // On error, allow manual entry
          setBarcodeNewMedForm(prev => ({
            ...prev,
            medicationId: null,
            medicationLocked: false,
            existingBatches: [],
            existingBatchId: null
          }));
        }
      };

      // Field order for Enter-key navigation in the barcode new medication modal
      const BARCODE_NEW_MED_FIELD_ORDER = [
        'barcodeNewMed-name', 'barcodeNewMed-strength', 'barcodeNewMed-type',
        'barcodeNewMed-itemsPerBox', 'barcodeNewMed-batchSelect', 'barcodeNewMed-batchNumber',
        'barcodeNewMed-expiryMonth', 'barcodeNewMed-expiryYear',
        'barcodeNewMed-brand', 'barcodeNewMed-boxQuantity', 'barcodeNewMed-location'
      ];

      const focusNextBarcodeField = (currentId) => {
        const idx = BARCODE_NEW_MED_FIELD_ORDER.indexOf(currentId);
        if (idx === -1) return;
        for (let i = idx + 1; i < BARCODE_NEW_MED_FIELD_ORDER.length; i++) {
          const el = document.getElementById(BARCODE_NEW_MED_FIELD_ORDER[i]);
          if (el && !el.disabled && !el.readOnly) {
            el.focus();
            return;
          }
        }
      };

      // Reset barcode new medication form to initial state
      const resetBarcodeNewMedForm = () => {
        setBarcodeNewMedForm({
          barcode: '',
          medicationId: null,
          name: '',
          strength: '',
          strengthType: 'value',
          type: 'tablet',
          expiryMonth: '',
          expiryYear: '',
          quantityType: 'boxes',
          boxQuantity: '',
          itemsPerBox: '',
          individualQuantity: '',
          minLevelType: 'boxes',
          minLevel: '',
          minLevelBoxes: '',
          brand: '',
          batchNumber: '',
          serial: '', // GS1 serial number
          existingBatchId: null,
          existingBatches: [],
          enteringNewBatch: false,
          batchLocked: false,
          batchExists: false,
          medicationLocked: false,
          location: '',
          error: '',
          successMessage: '',
          isSubmitting: false,
          activeTab: 'addStock',
          transferSourceLocation: '',
          transferTargetLocation: '',
          transferBatchId: '',
          transferQuantity: '',
          transferQuantityType: 'boxes',
          transferUseQuantity: '',
          transferUseQuantityType: 'individual',
          useMode: 'hospital',
          patientFirstName: '',
          patientLastName: '',
          patientLocalId: '',
          useLocation: '',
          useBatchId: '',
          useQuantity: '',
          useQuantityType: 'individual',
          useReason: '',
          useNotes: '',
          orderQuantity: '',
          orderUrgency: 'routine',
          orderNotes: '',
          orderPharmacistEmail: tc.email(),
          manualMode: false,
          stockMode: 'new',
          searchTerm: ''
        });
      };

      // Camera Barcode Scanner Functions
      // ===================================
      // Library: html5-qrcode (https://github.com/mebjas/html5-qrcode)
      // Supports: 1D barcodes (EAN-13, Code 128, etc.) and 2D barcodes (QR Code, Data Matrix, etc.)
      // Browser requirement: HTTPS (already required in production)
      // Mobile support: Optimized for iOS Safari and Android Chrome

      const startCameraScanner = async () => {
        setCameraScanner(prev => ({
          ...prev,
          isOpen: true,
          isScanning: false,
          error: '',
          lastScannedCode: '',
          lastScanTime: 0
        }));

        // Wait for DOM to render the video element
        setTimeout(async () => {
          let tempStream = null;
          try {
            if (typeof Html5Qrcode === 'undefined') {
              throw new Error('Barcode scanner library not loaded. Please refresh the page.');
            }

            const element = document.getElementById("barcode-scanner-video");
            if (!element) {
              throw new Error('Scanner element not ready. Please try again.');
            }

            // Use native getUserMedia to force the permission dialog
            tempStream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: 'environment' }
            });
            tempStream.getTracks().forEach(track => track.stop());
            tempStream = null;

            // Get list of cameras (permission already granted)
            const devices = await navigator.mediaDevices.enumerateDevices();
            const cameras = devices.filter(device => device.kind === 'videoinput');

            if (!cameras || cameras.length === 0) {
              throw new Error('No cameras found on this device.');
            }

            // Prefer the back camera
            let cameraId = cameras[0].deviceId;
            for (const camera of cameras) {
              if (camera.label && camera.label.toLowerCase().includes('back')) {
                cameraId = camera.deviceId;
                break;
              }
            }

            // Initialize scanner instance
            if (!cameraScannerRef.current) {
              cameraScannerRef.current = new Html5Qrcode("barcode-scanner-video", {
                formatsToSupport: [
                  Html5QrcodeSupportedFormats.DATA_MATRIX,
                  Html5QrcodeSupportedFormats.QR_CODE,
                  Html5QrcodeSupportedFormats.EAN_13,
                  Html5QrcodeSupportedFormats.EAN_8,
                  Html5QrcodeSupportedFormats.CODE_128,
                  Html5QrcodeSupportedFormats.CODE_39,
                  Html5QrcodeSupportedFormats.UPC_A,
                  Html5QrcodeSupportedFormats.UPC_E,
                ]
              });
            }

            const scanner = cameraScannerRef.current;

            await scanner.start(
              cameraId,
              {
                fps: 15,
                aspectRatio: 1.7778,
                qrbox: (viewfinderWidth, viewfinderHeight) => {
                  return { width: Math.floor(viewfinderWidth * 0.8), height: Math.floor(viewfinderHeight * 0.8) };
                },
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
              },
              (decodedText) => handleBarcodeDetected(decodedText),
              () => {} // No barcode in view - normal, ignore
            );

            // After scanner starts, apply HD resolution + focus constraints to the video track
            // This gives the decoder more pixel data for dense Data Matrix codes
            try {
              const videoElement = document.querySelector('#barcode-scanner-video video');
              if (videoElement && videoElement.srcObject) {
                const track = videoElement.srcObject.getVideoTracks()[0];
                if (track) {
                  const capabilities = track.getCapabilities ? track.getCapabilities() : {};

                  // Request HD resolution for better Data Matrix decoding
                  try {
                    await track.applyConstraints({ width: { ideal: 1920 }, height: { ideal: 1080 } });
                  } catch (resErr) {
                    // Resolution upgrade is best-effort
                  }

                  // Apply macro focus if supported, otherwise fall back to continuous
                  if (capabilities.focusMode && capabilities.focusMode.includes('macro')) {
                    await track.applyConstraints({ advanced: [{ focusMode: 'macro' }] });
                  } else if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                    await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                  }
                  // If manual focus distance is available, set a close focus distance
                  if (capabilities.focusDistance) {
                    const minDist = capabilities.focusDistance.min || 0;
                    await track.applyConstraints({ advanced: [{ focusDistance: Math.max(minDist, 0.05) }] });
                  }
                  // Slight overexposure to brighten faint/low-contrast codes
                  if (capabilities.exposureCompensation) {
                    const maxExp = capabilities.exposureCompensation.max || 2;
                    await track.applyConstraints({ advanced: [{ exposureCompensation: maxExp * 0.5 }] });
                  }
                }
              }
            } catch (focusErr) {
              // Camera constraints are best-effort - don't fail if unsupported
            }

            // Detect torch capability
            let torchAvailable = false;
            try {
              const torchVideo = document.querySelector('#barcode-scanner-video video');
              if (torchVideo && torchVideo.srcObject) {
                const torchTrack = torchVideo.srcObject.getVideoTracks()[0];
                if (torchTrack) {
                  const torchCaps = torchTrack.getCapabilities ? torchTrack.getCapabilities() : {};
                  torchAvailable = !!torchCaps.torch;
                }
              }
            } catch (torchErr) {
              // Torch detection is best-effort
            }

            setCameraScanner(prev => ({ ...prev, isScanning: true, error: '', torchSupported: torchAvailable, torchOn: false }));

            // --- Enhanced contrast sidecar decoder ---
            // Grabs video frames, applies contrast stretching + thresholding,
            // then feeds the enhanced image to scanFile() for a second decode attempt.
            // This catches low-contrast and smudged codes that the live decoder misses.
            try {
              const sidecarVideo = document.querySelector('#barcode-scanner-video video');
              if (sidecarVideo) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                let sidecarBusy = false;

                enhancedScanIntervalRef.current = setInterval(async () => {
                  if (sidecarBusy || !cameraScannerRef.current) return;
                  sidecarBusy = true;
                  try {
                    const vw = sidecarVideo.videoWidth;
                    const vh = sidecarVideo.videoHeight;
                    if (!vw || !vh) { sidecarBusy = false; return; }

                    // Crop the center region (matching ~80% qrbox)
                    const cropSize = Math.min(vw, vh) * 0.8;
                    const sx = (vw - cropSize) / 2;
                    const sy = (vh - cropSize) / 2;
                    canvas.width = cropSize;
                    canvas.height = cropSize;
                    ctx.drawImage(sidecarVideo, sx, sy, cropSize, cropSize, 0, 0, cropSize, cropSize);

                    // Get pixel data and apply contrast stretching + threshold
                    const imageData = ctx.getImageData(0, 0, cropSize, cropSize);
                    const data = imageData.data;

                    // Pass 1: find min/max luminance
                    let minLum = 255, maxLum = 0;
                    for (let i = 0; i < data.length; i += 4) {
                      const lum = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                      if (lum < minLum) minLum = lum;
                      if (lum > maxLum) maxLum = lum;
                    }

                    // Pass 2: stretch contrast to full range and apply binary threshold
                    const range = maxLum - minLum || 1;
                    for (let i = 0; i < data.length; i += 4) {
                      const lum = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                      const stretched = ((lum - minLum) / range) * 255;
                      const bw = stretched > 128 ? 255 : 0;
                      data[i] = bw;
                      data[i + 1] = bw;
                      data[i + 2] = bw;
                    }
                    ctx.putImageData(imageData, 0, 0);

                    // Convert to blob and attempt decode via scanFile
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    if (!blob || !cameraScannerRef.current) { sidecarBusy = false; return; }
                    const file = new File([blob], 'enhanced-frame.png', { type: 'image/png' });
                    const decodedText = await cameraScannerRef.current.scanFile(file, false);
                    if (decodedText && cameraScannerRef.current) {
                      handleBarcodeDetected(decodedText);
                    }
                  } catch (e) {
                    // Decode failure is normal (no barcode in view) — silently continue
                  }
                  sidecarBusy = false;
                }, 250);
              }
            } catch (sidecarErr) {
              // Sidecar is best-effort — don't fail the scanner
            }
          } catch (err) {
            if (tempStream) {
              tempStream.getTracks().forEach(track => track.stop());
            }

            console.error('[Camera Scanner] Error:', err.name, err.message);

            const errMsg = err.message || '';
            let errorMessage;
            if (err.name === 'NotAllowedError' || errMsg.includes('Permission denied')) {
              errorMessage = 'Camera permission denied. Please click "Allow" when your browser asks for camera access, then try again.';
            } else if (err.name === 'NotFoundError' || errMsg.includes('No cameras found')) {
              errorMessage = 'No camera found on this device. Please use manual barcode entry.';
            } else if (err.name === 'NotSupportedError' || errMsg.includes('secure')) {
              errorMessage = 'Camera access requires HTTPS. Please ensure you are accessing the site via https:// (not http://)';
            } else if (errMsg.includes('not loaded') || errMsg.includes('not ready')) {
              errorMessage = errMsg;
            } else {
              errorMessage = `Failed to start camera: ${err.message || err.name || 'Unknown error'}. Please try manual entry.`;
            }

            setCameraScanner(prev => ({ ...prev, error: errorMessage, isScanning: false }));
          }
        }, 300);
      };

      const stopCameraScanner = async () => {
        // Stop enhanced scan sidecar loop
        if (enhancedScanIntervalRef.current) {
          clearInterval(enhancedScanIntervalRef.current);
          enhancedScanIntervalRef.current = null;
        }
        const wasOpenedViaScan = cameraScanner.openedViaScan;
        try {
          if (cameraScannerRef.current && cameraScannerRef.current.isScanning) {
            await cameraScannerRef.current.stop();
          }
        } catch (err) {
          console.error('Error stopping camera scanner:', err);
        } finally {
          setCameraScanner({
            isOpen: false,
            isScanning: false,
            error: '',
            lastScannedCode: '',
            lastScanTime: 0,
            torchOn: false,
            torchSupported: false,
            openedViaScan: false
          });
          // If camera was opened via Scan Barcode button and no medication was found, close the modal too
          if (wasOpenedViaScan && !barcodeNewMedForm.medicationLocked) {
            setModals(prev => ({ ...prev, showBarcodeNewMedication: false }));
            setBarcodeNewMedForm(prev => ({
              ...prev,
              barcode: '', name: '', strength: '', strengthType: 'value', type: 'tablet',
              expiryMonth: '', expiryYear: '', boxQuantity: '', itemsPerBox: '', brand: '',
              batchNumber: '', serial: '', existingBatchId: null, existingBatches: [],
              enteringNewBatch: false, batchLocked: false, batchExists: false,
              medicationLocked: false, medicationId: null, location: '',
              error: '', successMessage: '', isSubmitting: false, activeTab: 'addStock',
              manualMode: false, stockMode: 'new', searchTerm: ''
            }));
          }
        }
      };

      const toggleTorch = async () => {
        try {
          const videoElement = document.querySelector('#barcode-scanner-video video');
          if (!videoElement || !videoElement.srcObject) return;
          const track = videoElement.srcObject.getVideoTracks()[0];
          if (!track) return;
          const newState = !cameraScanner.torchOn;
          await track.applyConstraints({ advanced: [{ torch: newState }] });
          setCameraScanner(prev => ({ ...prev, torchOn: newState }));
        } catch (err) {
          // If toggle fails, hide the button
          setCameraScanner(prev => ({ ...prev, torchSupported: false, torchOn: false }));
        }
      };

      /**
       * Generic barcode scan handler (1D barcodes / fallback)
       *
       * Handles standard 1D barcodes or any codes that don't contain GS1 data.
       * Opens the "new medication from barcode" modal, which handles both:
       * - Creating a new medication (if barcode not found)
       * - Adding stock to an existing medication (if barcode found)
       *
       * @param {string} barcode - The raw barcode string
       */
      const handleGenericBarcodeScan = (barcode) => {
        // Pre-fill barcode field and trigger lookup
        setBarcodeNewMedForm(prev => ({
          ...prev,
          barcode,
          error: ''
        }));

        // Open the barcode modal (will show medication details if found, or new med form)
        setModals(prev => ({ ...prev, showBarcodeNewMedication: true }));

        // Trigger medication lookup
        handleBarcodeLookup(barcode);
      };

      /**
       * Medicine pack scan handler (GS1 2D barcodes)
       *
       * Handles GS1 DataMatrix codes found on medication packaging.
       * These codes contain structured data (GTIN, batch, expiry, serial).
       *
       * Smart behavior:
       * - Uses GTIN for medication lookup instead of full GS1 string
       * - Pre-fills batch number and expiry date from GS1 data
       * - If medication exists: opens modal in "add batch" mode with fields locked
       * - If medication doesn't exist: opens modal in "create medication + batch" mode
       *
       * @param {object} parsedGs1 - Parsed GS1 data from parseGs1Data()
       */
      const handleMedicinePackScan = (parsedGs1) => {
        // Use GTIN for lookup, fallback to raw string if GTIN missing
        const lookupBarcode = parsedGs1.gtin || parsedGs1.raw;

        // Format expiry date for the form (MM and YYYY fields)
        const dateFormat = window.formatDateForMonthYear(parsedGs1.expiryDate);

        // Pre-fill the form with GS1 data
        setBarcodeNewMedForm(prev => ({
          ...prev,
          barcode: lookupBarcode,
          batchNumber: parsedGs1.batch || prev.batchNumber,
          serial: parsedGs1.serial || prev.serial,
          expiryMonth: dateFormat.month || prev.expiryMonth,
          expiryYear: dateFormat.year ? String(dateFormat.year) : prev.expiryYear,
          error: ''
        }));

        // Open the barcode modal (will adapt based on whether medication is found)
        setModals(prev => ({ ...prev, showBarcodeNewMedication: true }));

        // Priority: 1) Barcode/GTIN lookup, 2) Batch number lookup, 3) Manual entry
        if (lookupBarcode && lookupBarcode.trim()) {
          handleBarcodeLookup(lookupBarcode);
        } else if (parsedGs1.batch && parsedGs1.batch.trim()) {
          handleBatchLookup(parsedGs1.batch);
        }
      };

      /**
       * Centralized scan detection handler
       *
       * This is the single entry point for all camera barcode scans.
       * Automatically detects whether a barcode is GS1-encoded or a simple 1D code,
       * then routes to the appropriate handler.
       *
       * Architecture:
       * - Scanner component is "dumb" - it just reports the raw decoded value
       * - This handler contains all the intelligence for GS1 detection and routing
       * - User never has to choose "1D vs 2D" - it's automatic
       *
       * @param {string} rawValue - Raw barcode string from scanner library
       */
      const handleScanDetected = (rawValue) => {
        // Route to Med Database handler when on that tab
        if (ui.activeTab === 'meddatabase') {
          const gs1 = window.parseGs1Data(rawValue);
          const lookupBarcode = gs1.isGs1 ? (gs1.gtin || rawValue) : rawValue;
          handleMedDbBarcodeScan(lookupBarcode);
          return;
        }

        const parsed = window.parseGs1Data(rawValue);

        // GS1 with batch/expiry data = medicine pack, otherwise generic barcode
        if (parsed.isGs1 && (parsed.batch || parsed.expiryDateRaw)) {
          // GS1 2D medicine pack with structured data
          handleMedicinePackScan(parsed);
        } else {
          // Simple 1D barcode or GS1 without batch data (treat as generic)
          handleGenericBarcodeScan(rawValue);
        }
      };

      /**
       * Camera barcode detection callback (simplified)
       *
       * This is the callback invoked by the html5-qrcode scanner library.
       * It handles:
       * - Duplicate scan prevention
       * - Scanner state management (stop scanning after detection)
       * - Delegating to the centralized handler
       *
       * The scanner is now a "dumb" component - it just decodes and reports.
       * All intelligence about GS1 vs 1D is in handleScanDetected.
       */
      const handleBarcodeDetected = (barcode) => {
        const now = Date.now();

        // Prevent duplicate scans of the same barcode within 2 seconds
        if (cameraScanner.lastScannedCode === barcode && (now - cameraScanner.lastScanTime) < 2000) {
          return;
        }

        // Update last scanned code and time
        setCameraScanner(prev => ({
          ...prev,
          lastScannedCode: barcode,
          lastScanTime: now
        }));

        // Stop the scanner (release camera)
        stopCameraScanner();

        // Delegate to centralized scan handler
        handleScanDetected(barcode);
      };

      // ── Med Database Tab: Barcode scan handler ──
      const handleMedDbBarcodeScan = async (barcode) => {
        const cleanBarcode = barcode.trim().replace(/\s+/g, '');
        if (!cleanBarcode) return;

        // Show loading state
        setMedDbForm(prev => ({
          ...prev,
          barcode: cleanBarcode,
          isLookingUp: true,
          existingMed: null,
          error: '',
          successMessage: '',
          manualEntry: false
        }));

        try {
          // Check database directly (local array only has meds with stock)
          const result = await window.api.lookupByBarcode(cleanBarcode);

          if (result.found && result.medication) {
            const med = result.medication;
            setMedDbForm(prev => ({
              ...prev,
              isLookingUp: false,
              name: med.name,
              strength: med.strength_raw || '',
              form: med.type || '',
              brand: med.brand || '',
              standardItemsPerBox: med.standard_items_per_box || '',
              existingMed: {
                name: med.name,
                strength: med.strength_raw || '',
                form: med.type || '',
                brand: med.brand || '',
                barcode: med.barcode || cleanBarcode
              }
            }));
          } else {
            setMedDbForm(prev => ({
              ...prev,
              isLookingUp: false,
              name: '',
              strength: '',
              form: 'Tablet',
              brand: '',
              standardItemsPerBox: '',
              existingMed: null
            }));
            // Focus name field after render
            setTimeout(() => {
              const nameInput = document.getElementById('meddb-name-input');
              if (nameInput) nameInput.focus();
            }, 100);
          }
        } catch (err) {
          // Fallback: check local array if API fails
          const existing = medications.find(med => med.barcode === cleanBarcode);
          if (existing) {
            setMedDbForm(prev => ({
              ...prev,
              isLookingUp: false,
              name: existing.name,
              strength: existing.strength || '',
              form: existing.form || '',
              brand: existing.brand || '',
              standardItemsPerBox: existing.standard_items_per_box || '',
              existingMed: existing
            }));
          } else {
            setMedDbForm(prev => ({
              ...prev,
              isLookingUp: false,
              existingMed: null,
              error: 'Barcode lookup failed. You can still register manually.'
            }));
          }
        }
      };

      // ── Med Database Tab: Submit new medication ──
      const handleMedDbSubmit = async (e) => {
        e.preventDefault();
        if (!medDbForm.name.trim()) {
          setMedDbForm(prev => ({ ...prev, error: 'Medication name is required.' }));
          return;
        }

        setMedDbForm(prev => ({ ...prev, isSubmitting: true, error: '', successMessage: '' }));

        try {
          const result = await window.api.medicationUpsert({
            name: medDbForm.name.trim(),
            strength: medDbForm.strength.trim() || null,
            form: medDbForm.form || 'Tablet',
            brand: medDbForm.brand.trim() || null,
            barcode: medDbForm.barcode.trim() || null,
            standardItemsPerBox: medDbForm.standardItemsPerBox ? Number(medDbForm.standardItemsPerBox) : null,
            userId: auth.userId || null
          });

          const newMed = {
            id: result.medicationId,
            name: medDbForm.name.trim(),
            strength: medDbForm.strength.trim(),
            form: medDbForm.form,
            brand: medDbForm.brand.trim(),
            barcode: medDbForm.barcode.trim(),
            wasCreated: result.wasCreated
          };

          setMedDbForm(prev => ({
            ...prev,
            isSubmitting: false,
            successMessage: result.wasCreated
              ? `"${medDbForm.name.trim()}" registered successfully!`
              : `"${medDbForm.name.trim()}" already exists (updated).`,
            sessionCount: prev.sessionCount + (result.wasCreated ? 1 : 0),
            sessionMeds: result.wasCreated ? [newMed, ...prev.sessionMeds] : prev.sessionMeds,
            barcode: '',
            name: '',
            strength: '',
            form: 'Tablet',
            brand: '',
            standardItemsPerBox: '',
            existingMed: null,
            manualEntry: false,
            error: ''
          }));

          // Refresh medications list to include new entry
          if (result.wasCreated) {
            try {
              const data = await window.api.fetchAllData();
              if (data && data.medications) setMedications(data.medications);
            } catch (refreshErr) {
              // Non-critical — list will refresh on next poll
            }
          }
        } catch (err) {
          setMedDbForm(prev => ({
            ...prev,
            isSubmitting: false,
            error: err.message || 'Failed to register medication.'
          }));
        }
      };

      // ── Med Database Tab: Reset form for next scan ──
      const handleMedDbReset = () => {
        setMedDbForm(prev => ({
          ...prev,
          barcode: '',
          name: '',
          strength: '',
          form: 'Tablet',
          brand: '',
          standardItemsPerBox: '',
          existingMed: null,
          error: '',
          successMessage: '',
          manualEntry: false
        }));
      };

      // Handle existing batch selection
      const handleExistingBatchSelect = (batchId) => {
        if (!batchId) {
          setBarcodeNewMedForm(prev => ({
            ...prev,
            existingBatchId: null,
            batchLocked: false,
            batchExists: false,
            batchNumber: '',
            brand: '',
            expiryMonth: '',
            expiryYear: '',
            itemsPerBox: prev.medicationLocked ? prev.itemsPerBox : '' // Keep if medication locked
          }));
          return;
        }

        const selectedBatch = barcodeNewMedForm.existingBatches.find(b => b.id === batchId);
        if (selectedBatch) {
          // Parse expiry date
          const expiryDate = selectedBatch.expiryDate ? new Date(selectedBatch.expiryDate) : null;
          const expiryMonth = expiryDate ? String(expiryDate.getMonth() + 1).padStart(2, '0') : '';
          const expiryYear = expiryDate ? String(expiryDate.getFullYear()) : '';

          setBarcodeNewMedForm(prev => ({
            ...prev,
            existingBatchId: batchId,
            batchLocked: true,
            batchExists: true,
            batchNumber: selectedBatch.batchCode || '',
            brand: selectedBatch.brand || '',
            expiryMonth: expiryMonth,
            expiryYear: expiryYear,
            itemsPerBox: selectedBatch.itemsPerBox ? String(selectedBatch.itemsPerBox) : prev.itemsPerBox
          }));
        }
      };

      const loadActivityLog = async (reset = false) => {
        if (activityLogFilters.length === 0) {
          setActivityLog([]);
          setActivityLogHasMore(false);
          return;
        }
        const loadId = ++activityLoadRef.current;
        setActivityLogLoading(true);
        try {
          // Expand filter aliases: medication_deleted also covers medication_restored
          const expandedFilters = [...activityLogFilters];
          if (expandedFilters.includes('medication_deleted') && !expandedFilters.includes('medication_restored')) {
            expandedFilters.push('medication_restored');
          }
          const params = {
            actionTypes: expandedFilters,
            limit: 50
          };
          if (activityUserFilter) params.userId = activityUserFilter;
          if (!reset && activityLog.length > 0) {
            params.beforeId = activityLog[activityLog.length - 1].id;
          }
          const data = await window.api.fetchActivityLog(params);
          if (loadId !== activityLoadRef.current) return; // stale response
          if (reset) {
            setActivityLog(data.entries || []);
          } else {
            setActivityLog(prev => [...prev, ...(data.entries || [])]);
          }
          setActivityLogHasMore(data.hasMore || false);
        } catch (err) {
          if (loadId !== activityLoadRef.current) return; // stale
          console.error('Failed to load activity log:', err);
        } finally {
          if (loadId === activityLoadRef.current) {
            setActivityLogLoading(false);
          }
        }
      };

      const handleLogin = async () => {
        if (!auth.currentUser.trim() || !auth.password.trim()) {
          setAuth(prev => ({ ...prev, error: 'Please enter both username and password' }));
          return;
        }

        try {
          const res = await fetch('/.netlify/functions/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: auth.currentUser, password: auth.password })
          });

          const data = await res.json();

          if (!res.ok || !data.success) {
            setAuth(prev => ({ ...prev, error: data.message || 'Login failed.', password: '' }));
            return;
          }

          // Store user info in sessionStorage
          sessionStorage.setItem('currentUser', JSON.stringify(data.user));
          
          // Load medications, transactions, and locations from backend BEFORE setting isLoggedIn
          // This prevents the flash of empty/old data
          try {
            const backendData = await window.api.fetchAllData();
            setMedications(backendData.medications || []);
            setTransactions(backendData.transactions || []);
            setLocations(backendData.locations || []);
            
            // Default to "All Locations" for all users on login
            let defaultLocation = 'All';
            const userRole = data.user.role;
            
            // Determine default tab based on user role
            // Helper function to check tab access (defined inline for this scope)
            const canAccessTabLocal = (tabName) => {
              if (userRole === 'Administrator' || userRole === 'Pharmacist') return true;
              if (userRole === 'Stock Manager') return true;
              if (userRole === 'Stock User') return tabName !== 'transactions';
              if (userRole === 'Basic User') return tabName === 'medications';
              return false;
            };
            
            let defaultTab = 'medications';
            if (!canAccessTabLocal(defaultTab)) {

      const handleLogout = () => {

        /**
         * Hardware barcode scanner handler (infrared/Bluetooth scanners)
         *
         * This handler is invoked when the global hardware scanner detects a barcode
         * via keyboard emulation (rapid keystroke detection).
         *
         * Unlike the camera scanner which always opens the "new medication" modal,
         * the hardware scanner has different behavior based on scan context:
         * - If medication found: Opens stock adjustment modal (for quick stock operations)
         * - If medication not found: Opens new medication modal
         *
         * GS1 codes are automatically detected and batch/expiry data is pre-filled.
         *
         * Supported AIs: (01) GTIN, (10) Batch, (17) Expiry YYMMDD, (21) Serial
         */
        const handleBarcodeScanned = (barcode) => {
          // Route to Med Database handler when on that tab
          if (ui.activeTab === 'meddatabase') {
            const gs1 = window.parseGs1Data(barcode);
            const lookupBarcode = gs1.isGs1 ? (gs1.gtin || barcode) : barcode.trim().replace(/\s+/g, '');
            handleMedDbBarcodeScan(lookupBarcode);
            return;
          }

          const gs1Data = window.parseGs1Data(barcode);

          // Determine lookup barcode and extract GS1 fields if present
          let lookupBarcode = barcode.trim().replace(/\s+/g, '');
          let batchNumber = '';
          let expiryMonth = '';
          let expiryYear = '';

          if (gs1Data.isGs1) {
            lookupBarcode = gs1Data.gtin || lookupBarcode;
            batchNumber = gs1Data.batch || '';
            const dateFormat = window.formatDateForMonthYear(gs1Data.expiryDate);
            expiryMonth = dateFormat.month || '';
            expiryYear = dateFormat.year ? String(dateFormat.year) : '';
          }

          const cleanBarcode = lookupBarcode.trim().replace(/\s+/g, '');

          // Try to find medication by barcode (exact match first)
          let foundMedication = medications.find(med => med.barcode === cleanBarcode);

          // If not found by exact barcode, try other methods
          if (!foundMedication) {
            foundMedication = medications.find(med =>
              med.name.toLowerCase().includes(cleanBarcode.toLowerCase()) ||
              med.id.toString() === cleanBarcode
            );
          }

          if (foundMedication) {
            // Medication found - open stock adjustment modal

            setUi(prev => ({
              ...prev,
              selectedMed: foundMedication,
              searchTerm: foundMedication.name
            }));

            // Default quantity type to boxes
            const defaultQuantityType = 'boxes';

            // Open the barcode stock adjustment modal
            setModals(prev => ({ ...prev, showBarcodeStockAdjust: true }));
            setAdjustmentForm({ amount: '', note: '', location: '', type: defaultQuantityType, action: 'out', batchId: '', sourceDepartment: '', stockInSource: 'delivery', transferBatchOption: 'existing', deliveryBatchOption: 'new', stockOutPurpose: 'transfer', patientLastName: '', patientLocalId: '', useReason: '', error: '' });

            // Populate deliveryForm with GS1 data if available (for stock-in with new batch)
            setDeliveryForm({
              brand: '',
              expiryMonth: expiryMonth,
              expiryYear: expiryYear,
              quantityType: defaultQuantityType,
              boxQuantity: '',
              itemsPerBox: '',
              individualQuantity: '',
              batchNumber: batchNumber
            });

            // Scroll to the medication in the list
            setTimeout(() => {
              const medElement = document.querySelector(`[data-med-id="${foundMedication.id}"]`);
              if (medElement) {
                medElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            }, 100);

          } else {
            // Medication not found - open new medication modal

            const defaultLocation = (ui.currentLocation !== 'All' && !isGroupName(ui.currentLocation, locations)) ? ui.currentLocation : 'Cupboard 1';
            setModals(prev => ({ ...prev, showBarcodeNewMedication: true }));
            setBarcodeNewMedForm(prev => ({
              ...prev,
              barcode: cleanBarcode,
              batchNumber: batchNumber,
              expiryMonth: expiryMonth,
              expiryYear: expiryYear,

              strengthType: 'value' // Always default to 'value' for new barcode scans
